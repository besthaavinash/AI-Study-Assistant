<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card p-3">

                <h3>Total Notes</h3>

                <h1>12</h1>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3">

                <h3>Quizzes</h3>

                <h1>8</h1>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3">

                <h3>Flashcards</h3>

                <h1>24</h1>

            </div>

        </div>

    </div>

</div>

</body>
</html>
