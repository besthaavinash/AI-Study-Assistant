<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Study Assistant</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Premium Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="auth-card glass-container">
        <h2 class="text-center mb-2 auth-title">AI Study Assistant</h2>
        <p class="text-center text-secondary mb-4" style="font-size: 0.9rem;">Sign in to resume your learning journey</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="loginEmail">Email Address</label>
                <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="name@example.com"
                    required>
            </div>

            <div class="mb-4">
                <label for="loginPassword">Password</label>
                <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="••••••••"
                    required>
            </div>

            <button
                type="submit"
                id="loginBtn"
                class="btn-premium w-100 mb-3">
                Sign In
            </button>
        </form>

        <p class="text-center mt-3 mb-0 text-secondary" style="font-size: 0.9rem;">
            New to the assistant? 
            <a href="register.html" class="text-info text-decoration-none fw-semibold ms-1">Create an account</a>
        </p>
    </div>
</div>

<!-- Toast Container for Notifications -->
<div class="toast-container" id="toastContainer"></div>

<!-- JS Script -->
<script src="js/script.js"></script>
</body>
</html>
