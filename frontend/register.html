<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Study Assistant</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Premium Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="auth-card glass-container">
        <h2 class="text-center mb-2 auth-title">Create Account</h2>
        <p class="text-center text-secondary mb-4" style="font-size: 0.9rem;">Join the AI-powered learning workspace</p>
        
        <form id="registerForm">
            <div class="mb-3">
                <label for="registerName">Full Name</label>
                <input
                    type="text"
                    id="registerName"
                    class="form-control"
                    placeholder="John Doe"
                    required>
            </div>

            <div class="mb-3">
                <label for="registerEmail">Email Address</label>
                <input
                    type="email"
                    id="registerEmail"
                    class="form-control"
                    placeholder="name@example.com"
                    required>
            </div>

            <div class="mb-4">
                <label for="registerPassword">Password</label>
                <input
                    type="password"
                    id="registerPassword"
                    class="form-control"
                    placeholder="••••••••"
                    required>
            </div>

            <button
                type="submit"
                id="registerBtn"
                class="btn-premium w-100 mb-3">
                Create Account
            </button>
        </form>

        <p class="text-center mt-3 mb-0 text-secondary" style="font-size: 0.9rem;">
            Already have an account? 
            <a href="login.html" class="text-info text-decoration-none fw-semibold ms-1">Sign In</a>
        </p>
    </div>
</div>

<!-- Toast Container for Notifications -->
<div class="toast-container" id="toastContainer"></div>

<!-- JS Script -->
<script src="js/script.js"></script>
</body>
</html>
