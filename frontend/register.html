<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="login-card">

        <h2 class="text-center mb-4">
            Create Account
        </h2>

        <form>

            <div class="mb-3">
                <label>Name</label>

                <input
                    type="text"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>

                <input
                    type="email"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Password</label>

                <input
                    type="password"
                    class="form-control">
            </div>

            <button
                class="btn btn-success w-100">

                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
